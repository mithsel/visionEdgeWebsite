<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 200">
  <style>
    .logo-text {
      font-family: 'Inter', Arial, sans-serif;
      font-size: 72px;
      font-weight: 800;
      letter-spacing: -1px;
    }

    /* Light Mode */
    .text-main {
      fill: #1f2937;
    }

    /* Dark Mode */
    @media (prefers-color-scheme: dark) {
      .text-main {
        fill: #ffffff;
      }
    }

    .accent {
      fill: #2563eb;
    }
  </style>

  <!-- Triangle Icon -->
  <polygon 
    points="70,160 140,40 210,160" 
    class="accent"
  />

  <!-- Inner cut (to match logo style) -->
  <polygon 
    points="105,140 140,80 175,140" 
    fill="white"
  />

  <!-- Text -->
  <text x="240" y="135" class="logo-text text-main">
    Vision<tspan class="accent">Edge</tspan>
  </text>
</svg>